server:
  port: 8004
  servlet:
    context-path: /api

spring:
  application:
    name: fly-ops-service

  datasource:
    url: jdbc:mysql://localhost:3306/airline_fly_ops_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
