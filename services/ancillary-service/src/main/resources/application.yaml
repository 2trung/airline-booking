server:
  port: 8010
  servlet:
    context-path: /api

spring:
  application:
    name: ancillary-service

  datasource:
    url: jdbc:mysql://localhost:3306/airline_ancillary_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true